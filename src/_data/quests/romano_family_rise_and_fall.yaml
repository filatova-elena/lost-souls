id: romano_family_rise_and_fall
title: "The Romano Family: Rise and Fall"
subtitle: From Rum Runners to Art Dealers
type: major
content: |
  **1920s - The Glory Days:** Frankie "the Coast" Romano ruled the Port of Long Beach during Prohibition. Rum running from Mexico. Bootleg alcohol disguised as medicine. Exotic goods smuggled through Harbor Import & Trading Co. Connected, ruthless, respected.

  He supplied Sebastian Crane—"The Alchemist"—with bootleg spirits and rare botanical specimens. When Sebastian tried to leave the operation after getting engaged, Frankie confronted him at the docks. A public argument. Dock workers watching. Frankie shouting: "You don't just WALK AWAY from Frankie Romano!"

  When Sebastian died days later, everyone assumed Frankie did it. But he didn't. (The real killer was much closer to home.)

  **1930s-1950s - Hollywood Heights:** The Romano family went "legitimate"—nightclubs, gambling, early film industry connections. Flashy parties with starlets and producers. New money at its trashiest and most visible. Tabloids loved them.

  **1960s-1980s - The Collapse:** The IRS came knocking. Investigations. Seizures. Everything lost. Bank accounts frozen. Properties auctioned. The Romano fortune destroyed.

  What survived: a few "family artifacts"—an ornate glass bottle, old shipping manifests, photographs from better days.

  **Present Day - The Art Collector:** The Art Collector grew up on whispers of past glory and faded photographs. Learned art dealing through necessity, discovered genuine talent. Now runs a legitimate business—but still dabbles in questionable provenance and shady deals. One foot in legitimacy, one in the shadows.

  The Romano way.

  That ornate glass bottle The Art Collector displays proudly as a family heirloom? It held the poison that killed three people. 