aspect: paranormal
title: Alice Whitmore
objective: "A presence lingers here, desperate to be heard. Listen to the dead, and guide The Lonely Spirit to rest."
answer: Alice Whitmore was a genuine psychic who fell in love with her doctor, Thaddeus Crane — a forbidden affair. When Cordelia Montrose discovered the relationship and threatened to expose Thaddeus, he poisoned Sebastian's elixir to silence her. Alice discovered the truth and demanded Thaddeus confess. He murdered her with a silver candle holder on the mansion staircase and staged it as an accidental fall.
