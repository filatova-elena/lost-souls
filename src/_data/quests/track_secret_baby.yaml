id: secret_baby
aspect: gossip
title: Secret Baby
objective: "Follow the whispers of scandal to uncover a family secret that keeps The Heartbroken Ghost from finding peace."
answer: Eleanor Sullivan was Cordelia Montrose's and Thomas Whitmore's secret daughter. The Montrose family forced Cordelia to give the baby away to the Sullivan family. The adoption was never finalized — Eleanor is the true heir to the Montrose estate.
