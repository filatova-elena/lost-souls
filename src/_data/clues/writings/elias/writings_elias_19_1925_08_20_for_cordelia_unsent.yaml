content: |
  She turns to roses in the garden light,

  Not knowing I have fallen into night.

  Each word she speaks, I cannot say my own—

  So beautiful, and yet forever alone.


  I tell her of the flowers, nothing more.

  My heart lies shattered on her garden floor.
