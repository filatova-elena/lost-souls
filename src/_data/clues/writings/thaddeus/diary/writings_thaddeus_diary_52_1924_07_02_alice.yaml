content: |
  Alice is exceptional. Maddening, infuriating, brilliant Alice. She possesses an understanding of human nature that borders on supernatural. When she looks at me, I believe she truly sees me—not the veneer of respectability, but the architect beneath. The Architect of my own destiny.
