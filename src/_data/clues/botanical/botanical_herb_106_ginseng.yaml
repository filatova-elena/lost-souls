content: |
  <div style="text-align: center;font-size: 40px;">✋</div>
  A pale root with a distinctive forked, human-like shape, stored carefully in a glass jar. It looks old and precious — someone kept this with intention.

  You recognize it as **Ginseng Root (Panax ginseng)** — rare and difficult to source, usually imported from Asia. Known in traditional medicine for vitality and longevity.

  On the jar, a hand-written label with alchemical symbols and the words: *"The root that binds."*
