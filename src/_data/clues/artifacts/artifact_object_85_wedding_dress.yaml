  <div style="text-align: center;font-size: 40px;">✋</div>
  An exquisite but unfinished wedding dress on a dress form, with intricate beading and lace details.

  ## In the pocket you find:

  A folded note on printed stationery: **Monroe Bespoke & Alterations — Elias Monroe, Proprietor — Long Beach, California**

  Bust: 34 inches. Waist: 24 inches. Length: 62 inches from shoulder. Shoulders: narrow, elegant.

  *Note: She is smaller than she appears. Delicate frame. Handle with care during fittings.*

  Fabric: French lace and ivory silk. Design: High neckline, long sleeves, train.

  Special request: Include a pocket (she laughed when she asked—said she might need somewhere to hide).

  Completion date: October 10, 1925. Status: In progress. Making the most careful stitches of my life.
