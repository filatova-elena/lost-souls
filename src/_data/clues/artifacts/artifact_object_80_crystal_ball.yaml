content: |
  <div style="text-align: center;font-size: 40px;">✋</div>
  *You place your hands on the crystal sphere. The cloud patterns inside begin to shift and swirl.*

  *The scent of roses and something you can't place fills the room — sweet and heavy, suffocating.*

  *A baby's cry. Distant. Muffled. As if coming from behind a closed door.*

  *Something heavy presses against your chest. A weight that isn't yours.*

  *Footsteps on a staircase. Then — nothing.*

  *The clouds settle. The scent fades. Your hands are trembling.*
